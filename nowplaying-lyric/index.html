<!--
name: Now Playing 歌词
description: 需要Widdit/NowPlaying软件配合使用
securityLevel: script
overflow: hidden
width: 735
height: 165
opacity: 100
pinned: true
$str | EG | {"zh":"说明", "en":"Info"} | (multi, noedit) : 从这里了解用法：https://github.com/Lumi083/now-playing-MiraUI
$bool | showTranslation | {"zh":"显示翻译", "en":"Show Translation"} : true
$bool | autoWrap | {"zh":"自动换行", "en":"Auto Wrap"} : true
$bool | karaokeMode | {"zh":"逐字特效", "en":"Karaoke Mode"} : true
$bool | hideOnNoLyric | {"zh":"无歌词时隐藏", "en":"Hide When No Lyric"} : false
$rgba | backgroundColor | {"zh":"背景颜色", "en":"Background Color"} : rgba(0, 0, 0, 0.3)
$num | mainSize | {"zh":"主歌词字号", "en":"Main Font Size"} | (18~88, int) : 26
$num | subSize | {"zh":"副歌词字号", "en":"Sub Font Size"} | (9~48, int) : 12
$num | lineGap | {"zh":"行间距", "en":"Line Gap"} | (10~60, int) : 21
$num | alignPos | {"zh":"垂直对齐", "en":"Vertical Align"} | (0.2~0.8, step=0.05) : 0.50
$num | activeScale | {"zh":"激活缩放", "en":"Active Scale"} | (1.0~1.8, step=0.05) : 1.25
$num | blurStrength | {"zh":"背景模糊", "en":"Blur Strength"} | (0~10, step=0.1) : 0
$num | scrollSpeed | {"zh":"滚动速度", "en":"Scroll Speed"} | (0.02~0.5, step=0.01) : 0.03
$rgba | activeColor | {"zh":"已播放颜色", "en":"Played Color"} : rgba(255, 255, 255, 1)
$rgba | pendingColor | {"zh":"待播放颜色", "en":"Pending Color"} : rgba(255, 255, 255, 0.6)
$rgba | inactiveColor | {"zh":"非激活行颜色", "en":"Inactive Line Color"} : rgba(255, 255, 255, 0.6)
$rgba | highlightColor | {"zh":"辉光颜色", "en":"Glow Color"} : rgba(100, 148, 255, 0.6)
-->

<style>
  :root {
    --bg-color: rgba(0,0,0,0.3);
    --active-color: #fff;
    --pending-color: rgba(255,255,255,0.6);
    --inactive-color: rgba(255,255,255,0.6);
    --highlight-color: #4facfe;
    --active-line-color: var(--pending-color);
    --gap: 24px;
    --blur: 2px;
    --scale: 1.28;
    --font-main: "Segoe UI", "Microsoft YaHei", sans-serif;
  }

  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    font-family: var(--font-main);
    user-select: none;
  }

  #app {
    position: relative;
    width: 100%;
    height: 100%;
    background-color: var(--bg-color);
    transition: background-color 0.3s;
    overflow: hidden;
  }

  .mask {
    position: absolute;
    inset: 0;
    z-index: 10;
    pointer-events: none;
    -webkit-mask-image: linear-gradient(to bottom, 
      rgba(0,0,0,0) 0%, 
      rgba(0,0,0,1) 20%, 
      rgba(0,0,0,1) 80%, 
      rgba(0,0,0,0) 100%
    );
    mask-image: linear-gradient(to bottom, 
      rgba(0,0,0,0) 0%, 
      rgba(0,0,0,1) 20%, 
      rgba(0,0,0,1) 80%, 
      rgba(0,0,0,0) 100%
    );
  }

  .lyric-container {
    position: absolute;
    top: 40%;
    left: 0;
    width: 100%;
    /* 关键布局：左右留白 15%，确保放大 1.3~1.5倍 后不会溢出屏幕 */
    padding: 0 15%; 
    box-sizing: border-box;
    transform: translateY(0); 
    display: flex;
    flex-direction: column;
    align-items: center; 
    will-change: transform;
  }

  .line {
    position: relative;
    width: 100%;
    text-align: center;
    transition: opacity 0.35s ease-out, filter 0.35s ease-out, transform 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28);
    margin-bottom: var(--gap);
    transform-origin: center center;
    
    /* 非激活行状态 */
    opacity: 0.6;
    filter: blur(var(--blur));
    transform: scale(1);
    color: var(--inactive-color);
  }

  .line.active {
    opacity: 1;
    filter: blur(0);
    transform: scale(var(--scale));
    z-index: 5;
    /* 激活行默认文字颜色（用于非逐字部分） */
    color: var(--active-line-color);
    text-shadow: 0 4px 12px rgba(0,0,0,0.3);
  }

  .main-text {
    font-weight: 700;
    line-height: 1.35;
  }
  
  .sub-text {
    margin-top: 8px;
    font-weight: 500;
    opacity: 0.9;
    line-height: 1.4;
    font-size: 0.5em; /* 相对大小 */
  }

  /* 自动换行 */
  .nowrap .main-text, .nowrap .sub-text {
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .wrap .main-text, .wrap .sub-text {
    white-space: pre-wrap;
    word-break: break-word;
  }

  /* --- 逐字动画核心 --- */
  
  /* 单词基础样式 */
  .k-word {
    display: inline-block;
    position: relative;
    transition: color 0.1s;
    /* 激活行的默认字颜色（未播放状态）：清晰，但颜色不同 */
    color: var(--pending-color);
  }

  /* 非激活行的单词样式 */
  .line:not(.active) .k-word {
    color: var(--inactive-color);
  }

  /* 已播放状态 */
  .k-word.played {
    color: var(--active-color);
    /* 触发一次性辉光动画 */
    animation: flash 0.4s ease-out forwards;
  }

  @keyframes flash {
    0% {
      text-shadow: 0 0 0 transparent;
      transform: scale(1);
    }
    10% {
      /* 爆发辉光 */
      text-shadow: 0 0 20px var(--highlight-color), 0 0 40px var(--active-color);
      color: #fff;
      transform: scale(1.02);
    }
    100% {
      /* 稳定状态 */
      text-shadow: 0 0 2px var(--highlight-color);
      transform: scale(1);
    }
  }

  .simple-text {
    color: inherit;
  }

  .empty-tip {
    position: absolute;
    inset: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 24px;
    color: rgba(255,255,255,0.6);
  }

</style>

<div id="app">
  <div class="mask"></div>
  <div class="lyric-container" id="lyric-box"></div>
</div>

<script>
(function() {
  const API_BASE = 'http://localhost:9863';
  
  // --- 配置 ---
  const DEFAULT_CONFIG = {
    showTranslation: true,
    autoWrap: true,
    karaokeMode: true,
    hideOnNoLyric: false,
    backgroundColor: 'rgba(0, 0, 0, 0.3)',
    mainSize: 48,
    subSize: 22,
    lineGap: 24,
    alignPos: 0.45,
    activeScale: 1.3,
    blurStrength: 1.5,
    scrollSpeed: 0.15,
    activeColor: 'rgba(255, 255, 255, 1)',
    pendingColor: 'rgba(255, 255, 255, 0.5)',
    inactiveColor: 'rgba(255, 255, 255, 0.3)',
    highlightColor: 'rgba(100, 220, 255, 0.9)'
  };
  let config = { ...DEFAULT_CONFIG };

  const state = {
    lines: [],
    doms: [],
    trackId: null,
    progress: 0,
    isPlaying: false,
    lastTick: 0,
    activeIndex: -1,
    currentScrollY: 0,
    targetScrollY: 0,
    lyricRaw: null,
    hasKaraoke: false
  };

  const els = {
    app: document.getElementById('app'),
    box: document.getElementById('lyric-box'),
    empty: document.getElementById('empty')
  };

  // --- 解析逻辑 ---
  
  function parseLrc(text) {
    if (!text) return [];
    const lines = [];
    const rows = text.split(/\r?\n/);
    for (let row of rows) {
      // 支持多种时间格式: [MM:SS], [MM:SS.ms], [MM:SS:XX], [HH:MM:SS]
      const timeTags = row.match(/\[\d{1,2}:\d{1,2}(?:[:.]\d{1,3})?\]/g);
      if (!timeTags) continue;
      const content = row.replace(/\[.*?\]/g, '').trim();
      if (!content) continue;
      for (let tag of timeTags) {
        const m = tag.match(/\[(\d+):(\d+)(?:[:.]\d+)?\]/);
        if (!m) continue;
        const first = parseInt(m[1]);
        const second = parseInt(m[2]);
        
        // 判断是 HH:MM:SS 还是 MM:SS[.ms]
        // 如果第一个数字 > 59，则认为是 HH:MM:SS 格式
        let time;
        if (first > 59) {
          time = first * 3600000 + second * 60000;
        } else {
          time = first * 60000 + second * 1000;
        }
        
        // 提取毫秒部分（如果存在）
        const msMatch = tag.match(/[:.]\d+\]/);
        if (msMatch) {
          const msStr = msMatch[0].slice(1, -1);
          const msVal = parseInt(msStr);
          // 如果是冒号格式 [MM:SS:XX]，XX可能是百分秒或毫秒
          if (tag.includes(':') && msMatch[0].startsWith(':')) {
            if (msStr.length <= 2) {
              time += msVal * 10; // 百分秒转毫秒
            } else {
              time += msVal; // 已是毫秒
            }
          } else if (msMatch[0].startsWith('.')) {
            // .格式是小数秒，需要转换
            time += parseInt(msStr.padEnd(3, '0').slice(0, 3));
          }
        }
        
        lines.push({ time: Math.round(time), text: content, isKaraoke: false });
      }
    }
    return lines.sort((a,b) => a.time - b.time);
  }

  function parseKaraoke(xmlStr) {
    const contentMatch = xmlStr.match(/LyricContent="([^"]+)"/);
    const rawContent = contentMatch ? contentMatch[1] : xmlStr;
    const lines = [];
    const rawLines = rawContent.split(/\r?\n/);

    for (let row of rawLines) {
      const lineMeta = row.match(/^\[(\d+),(\d+)\](.*)/);
      if (!lineMeta) continue;
      const startTime = parseInt(lineMeta[1]);
      const duration = parseInt(lineMeta[2]);
      const body = lineMeta[3]; 

      const words = [];
      const wordRegex = /(.+?)\((\d+),(\d+)\)/g;
      let match;
      while ((match = wordRegex.exec(body)) !== null) {
        words.push({
          text: match[1],
          start: parseInt(match[2]),
          dur: parseInt(match[3])
        });
      }
      if (words.length > 0) {
        lines.push({
          time: startTime,
          duration: duration,
          text: words.map(w => w.text).join(''),
          words: words,
          isKaraoke: true
        });
      }
    }
    return lines.sort((a,b) => a.time - b.time);
  }

  function mergeTrans(lines, transText) {
    if (!transText) return;
    const transLines = parseLrc(transText);
    if (!transLines.length) return;
    for (let line of lines) {
      const tLine = transLines.find(t => Math.abs(t.time - line.time) < 600);
      if (tLine) line.trans = tLine.text;
    }
  }

  function buildData() {
    if (!state.lyricRaw) return;
    state.hasKaraoke = false;
    let result = [];

    if (state.lyricRaw.hasKaraokeLyric && state.lyricRaw.karaokeLyric) {
      try {
        result = parseKaraoke(state.lyricRaw.karaokeLyric);
        if (result.length > 0) state.hasKaraoke = true;
      } catch(e) {}
    }
    if (result.length === 0 && state.lyricRaw.lrc) {
      result = parseLrc(state.lyricRaw.lrc);
    }
    if (result.length === 0) {
      result.push({ time: 0, text: "No Lyric", isKaraoke: false });
    }
    if (state.lyricRaw.translatedLyric) {
      mergeTrans(result, state.lyricRaw.translatedLyric);
    }
    // 补时长
    for (let i = 0; i < result.length; i++) {
      const curr = result[i];
      const next = result[i+1];
      if (!curr.duration) curr.duration = next ? (next.time - curr.time) : 8000;
    }
    state.lines = result;
    renderDOM();
  }

  // --- 渲染 ---
  function renderDOM() {
    els.box.innerHTML = '';
    state.doms = [];
    const hasLyric = state.lines.length && state.lines[0].text !== "No Lyric";
    els.empty.style.display = hasLyric ? 'none' : 'flex';
    // 处理无歌词时隐藏功能
    if (!hasLyric && config.hideOnNoLyric) {
      els.app.style.opacity = '0';
      els.app.style.pointerEvents = 'none';
    } else {
      els.app.style.opacity = '1';
      els.app.style.pointerEvents = 'auto';
    }
    const frag = document.createDocumentFragment();

    state.lines.forEach((line) => {
      const div = document.createElement('div');
      div.className = 'line';
      if (config.autoWrap) div.classList.add('wrap');
      else div.classList.add('nowrap');

      // Main Text
      const mainDiv = document.createElement('div');
      mainDiv.className = 'main-text';
      mainDiv.style.fontSize = config.mainSize + 'px';

      if (line.isKaraoke && config.karaokeMode) {
        line.words.forEach(w => {
          const span = document.createElement('span');
          span.className = 'k-word';
          span.textContent = w.text;
          span._start = w.start; // 缓存时间
          mainDiv.appendChild(span);
        });
      } else {
        const span = document.createElement('span');
        span.className = 'simple-text';
        span.textContent = line.text;
        mainDiv.appendChild(span);
      }
      div.appendChild(mainDiv);

      // Translation
      if (config.showTranslation && line.trans) {
        const subDiv = document.createElement('div');
        subDiv.className = 'sub-text';
        subDiv.style.fontSize = config.subSize + 'px';
        subDiv.textContent = line.trans;
        div.appendChild(subDiv);
      }

      frag.appendChild(div);
      state.doms.push(div);
    });

    els.box.appendChild(frag);
    state.activeIndex = -1;
    updateStyle();
  }

  function updateStyle() {
    const s = document.body.style;
    s.setProperty('--bg-color', config.backgroundColor);
    s.setProperty('--active-color', config.activeColor);
    s.setProperty('--pending-color', config.pendingColor);
    s.setProperty('--inactive-color', config.inactiveColor);
    s.setProperty('--highlight-color', config.highlightColor);
    // 如果开启逐字并且有逐字数据，激活行使用 pendingColor（字仍会逐字点亮）；
    // 否则（未开启逐字或无逐字数据）激活行直接使用 activeColor
    s.setProperty('--active-line-color', (config.karaokeMode && state.hasKaraoke) ? config.pendingColor : config.activeColor);
    s.setProperty('--gap', config.lineGap + 'px');
    s.setProperty('--blur', config.blurStrength + 'px');
    s.setProperty('--scale', config.activeScale);
    els.box.style.top = (config.alignPos * 100) + '%';
  }

  // --- 动画循环 ---
  function renderLoop(now) {
    if (!state.lastTick) state.lastTick = now;
    const dt = now - state.lastTick;
    state.lastTick = now;

    if (state.isPlaying) state.progress += dt;

    // 查找当前行
    let idx = -1;
    for (let i = 0; i < state.lines.length; i++) {
      if (state.progress >= state.lines[i].time) idx = i;
      else break;
    }

    // 切换行状态
    if (idx !== state.activeIndex) {
      if (state.activeIndex !== -1 && state.doms[state.activeIndex]) {
        state.doms[state.activeIndex].classList.remove('active');
        // 离开时，把所有字设为已播放状态(防止回滚时状态错乱)或重置
        const spans = state.doms[state.activeIndex].querySelectorAll('.k-word');
        spans.forEach(s => s.classList.add('played'));
      }
      if (idx !== -1 && state.doms[idx]) {
        state.doms[idx].classList.add('active');
        // 进入时，重置所有字为未播放
        const spans = state.doms[idx].querySelectorAll('.k-word');
        spans.forEach(s => s.classList.remove('played'));
      }
      state.activeIndex = idx;
    }

    // 逐字状态判定 (瞬时高亮)
    if (state.activeIndex !== -1 && config.karaokeMode && state.hasKaraoke) {
      const activeLine = state.lines[state.activeIndex];
      if (activeLine && activeLine.isKaraoke) {
        const activeDom = state.doms[state.activeIndex];
        const spans = activeDom.querySelectorAll('.k-word');
        
        for (let i = 0; i < spans.length; i++) {
          const span = spans[i];
          // 如果时间到了，且还没有标记为 played，则标记
          if (state.progress >= span._start) {
            if (!span.classList.contains('played')) {
              span.classList.add('played');
            }
          } else {
            // 如果回退进度，撤销标记
            if (span.classList.contains('played')) {
              span.classList.remove('played');
            }
          }
        }
      }
    }

    // 滚动
    if (idx !== -1 && state.doms[idx]) {
      const el = state.doms[idx];
      const center = el.offsetTop + el.offsetHeight / 2;
      state.targetScrollY = -center;
    } else {
      state.targetScrollY = 0;
    }
    const diff = state.targetScrollY - state.currentScrollY;
    if (Math.abs(diff) > 0.5) {
      state.currentScrollY += diff * config.scrollSpeed;
      els.box.style.transform = `translateY(${state.currentScrollY.toFixed(2)}px)`;
    }

    requestAnimationFrame(renderLoop);
  }

  // --- 同步逻辑 ---
  async function syncLoop() {
    try {
      const [pRes, sRes] = await Promise.all([
        fetch(`${API_BASE}/api/query/progress`),
        fetch(`${API_BASE}/api/query/player`)
      ]);
      const pData = await pRes.json();
      const sData = await sRes.json();
      
      const serverMs = pData.progress * (pData.progress < 100000 && Number.isInteger(pData.progress) === false ? 1000 : 1); 
      // 简单判断秒/毫秒: 一般来说 progress API 返回的是秒(float) 或者 毫秒(int)
      // 用户提示是 ms, 这里直接用 pData.progress (assuming ms based on previous prompt). 
      // 实际上用户上一次说 {progress: 34252}，这是 ms。
      const realMs = pData.progress;

      state.isPlaying = !sData.isPaused;
      const diff = Math.abs(state.progress - realMs);

      if (!state.isPlaying || diff > 400) {
        state.progress = realMs;
      } else {
        state.progress = state.progress * 0.85 + realMs * 0.15;
      }
    } catch(e) {}
  }

  async function fetchTrack() {
    try {
      const [tRes, lRes] = await Promise.all([
        fetch(`${API_BASE}/api/query/track`),
        fetch(`${API_BASE}/api/lyric`)
      ]);
      const track = await tRes.json();
      const lyric = await lRes.json();
      if (track.id !== state.trackId || (track.title !== (state.track && state.track.title))) {
        state.track = track;
        state.trackId = track.id;
        state.lyricRaw = lyric;
        buildData();
      }
    } catch(e) {}
  }

  function initWS() {
    const ws = new WebSocket('ws://localhost:9863/api/ws/lyric');
    ws.onmessage = (e) => {
      try {
        const json = JSON.parse(e.data);
        if (json.event === 'Track' || json.event === 'Lyric') fetchTrack();
        if (json.event === 'PlayerPauseState' || json.event === 'PlayerSeek') syncLoop();
      } catch(e){}
    };
    ws.onclose = () => setTimeout(initWS, 3000);
  }

  window.addEventListener('message', (e) => {
    if (e.data.type === '__MIRAAPI_PROPS__') {
      Object.assign(config, e.data.props);
      updateStyle();
      if (e.data.props.mainSize || e.data.props.autoWrap) renderDOM();
    }
  });

  if (window.__MIRAAPI_PROPS__) Object.assign(config, window.__MIRAAPI_PROPS__);
  updateStyle();
  
  fetchTrack().then(() => {
    syncLoop();
    requestAnimationFrame(renderLoop);
    setInterval(syncLoop, 200);
    setInterval(fetchTrack, 2000);
    initWS();
  });

})();
</script>
